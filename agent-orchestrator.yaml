reactions:
  agent-working:
    auto: true
    action: update-tracker
    trackerState: "In Progress"

  pr-opened:
    auto: true
    action: update-tracker
    trackerState: "In Review"

  changes-requested:
    auto: true
    action: send-to-agent
    message: >-
      A reviewer has requested changes on your PR {{pr.url}}.
      You MUST read every piece of reviewer feedback before making changes.


      ## GitHub PR Review Comments

      Run these commands to read ALL reviewer feedback:

      1. `gh pr view {{pr.number}} --comments` — PR-level comments

      2. `gh api repos/{owner}/{repo}/pulls/{{pr.number}}/reviews` — review bodies with verdicts

      3. `gh api repos/{owner}/{repo}/pulls/{{pr.number}}/comments` — inline comments on specific lines


      ## Linear Issue Notes

      {{issue.comments}}


      Address every comment from both GitHub and Linear. Push your fixes and reply to each GitHub comment confirming what you changed.
    trackerState: "Revision"

  agent-needs-input:
    auto: true
    action: notify
    priority: urgent
    trackerState: "Blocked"

  agent-stuck:
    auto: true
    action: notify
    priority: urgent
    trackerState: "Blocked"

  review-approved:
    auto: true
    action: update-tracker
    trackerState: "Approved"

  approved-and-green:
    auto: true
    action: auto-merge

  pr-merged:
    auto: true
    action: update-tracker
    trackerState: "Done"
