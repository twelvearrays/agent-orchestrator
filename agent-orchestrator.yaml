# Agent Orchestrator — self-hosting config (dog-fooding)

dataDir: ~/.ao-sessions
worktreeDir: ~/.worktrees/ao

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [desktop]

projects:
  ao:
    name: Agent Orchestrator
    repo: ComposioHQ/agent-orchestrator
    path: ~/agent-orchestrator
    defaultBranch: main
    sessionPrefix: ao
    scm:
      plugin: github
    tracker:
      plugin: linear
      teamId: "2a6e9b1b-19cd-4e30-b5bd-7b34dc491c7e"
    symlinks: [.claude]
    postCreate:
      - "pnpm install"
    agentConfig:
      permissions: skip

  dashboard:
    name: Reboot Dashboard
    repo: goodcodeworks/dashboard_
    path: ~/code/good_code/dashboard_
    defaultBranch: develop
    sessionPrefix: dsh
    scm:
      plugin: github
    tracker:
      plugin: linear
      teamId: "f65d8805-05b4-41d2-a90b-dffe27e24d0b"
    agentRulesFile: .agent-rules.md
    agentConfig:
      permissions: skip

reactions:
  pr-opened:
    auto: true
    action: update-tracker
    trackerState: "In QA"
